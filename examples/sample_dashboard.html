<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小説スペクトラムアナライザー サンプル出力</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;line-height:1.6;font-size:14px}
  h1{text-align:center;font-size:1.3em;margin-bottom:4px;background:linear-gradient(90deg,#f0883e,#58a6ff,#56d364);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{text-align:center;color:#8b949e;font-size:.78em;margin-bottom:20px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px;margin-bottom:16px}
  .card h2{font-size:.95em;color:#58a6ff;margin-bottom:12px}
  svg{width:100%;display:block}
  .legend{display:flex;gap:12px;justify-content:center;font-size:.72em;margin-top:8px;flex-wrap:wrap}
  .legend-i{display:flex;align-items:center;gap:4px}
  .legend-d{width:12px;height:12px;border-radius:2px}
  .note{background:#1c2128;border-radius:6px;padding:12px;margin:10px 0;font-size:.78em;color:#8b949e}
</style>
</head>
<body>
<h1>📡 小説スペクトラムアナライザー</h1>
<p class="sub">サンプル出力 — 4作品の第1話クロスリファレンス比較</p>

<div class="note">
  これはサンプルダッシュボードです。あなたの作品をClaudeに添付し、プロンプトを実行すると同じ形式の出力が得られます。
  データは匿名化された実在作品の分析結果です。
</div>

<!-- レーダーチャート -->
<div class="card">
  <h2>🎯 5軸レーダー比較</h2>
  <svg id="radar" height="350"></svg>
  <div class="legend">
    <div class="legend-i"><div class="legend-d" style="background:#f0883e"></div>作品A（インスト型）</div>
    <div class="legend-i"><div class="legend-d" style="background:#58a6ff"></div>作品B（J-POP型）</div>
    <div class="legend-i"><div class="legend-d" style="background:#56d364"></div>作品C（ラジオトーク型）</div>
    <div class="legend-i"><div class="legend-d" style="background:#bc8cff"></div>作品D（アコースティック型）</div>
  </div>
</div>

<!-- 指標比較バー -->
<div class="card">
  <h2>📊 主要指標の比較</h2>
  <svg id="bars" height="320"></svg>
</div>

<!-- 音楽ジャンル判定 -->
<div class="card">
  <h2>🎵 音楽ジャンル自動判定</h2>
  <div id="genres"></div>
</div>

<script>
const works = [
  {id:'A',label:'作品A',color:'#f0883e',vd:1.68,ed:21.1,bd:9.4,dl:13.0,pt:13.8,dAvg:9.8,genre:'J-Rock（インスト）'},
  {id:'B',label:'作品B',color:'#58a6ff',vd:2.19,ed:9.5,bd:2.5,dl:25.6,pt:11.7,dAvg:19.2,genre:'J-POP'},
  {id:'C',label:'作品C',color:'#56d364',vd:4.02,ed:10.1,bd:0.8,dl:28.7,pt:6.5,dAvg:16.5,genre:'ラジオトーク'},
  {id:'D',label:'作品D',color:'#bc8cff',vd:2.94,ed:17.6,bd:9.7,dl:34.8,pt:8.8,dAvg:28.1,genre:'アコースティック'},
];

// Radar
function drawRadar(){
  const svg=document.getElementById('radar');
  const W=svg.clientWidth,H=350,cx=W/2,cy=175,R=130;
  const axes=['感情密度','身体密度','会話率','語彙密度','台詞長'];
  const norms=[
    d=>[d.ed/30,d.bd/15,d.dl/40,d.vd/5,d.dAvg/35]
  ];
  const n=axes.length;
  let html='';
  
  // Grid
  for(let r=.25;r<=1;r+=.25){
    let path='';
    for(let i=0;i<n;i++){
      const a=-Math.PI/2+2*Math.PI*i/n;
      const x=cx+R*r*Math.cos(a),y=cy+R*r*Math.sin(a);
      path+=(i?'L':'M')+x+','+y;
    }
    html+=`<path d="${path}Z" fill="none" stroke="#21262d" stroke-width="1"/>`;
  }
  // Axis lines + labels
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+2*Math.PI*i/n;
    const x=cx+R*Math.cos(a),y=cy+R*Math.sin(a);
    const lx=cx+(R+18)*Math.cos(a),ly=cy+(R+18)*Math.sin(a);
    html+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#30363d"/>`;
    html+=`<text x="${lx}" y="${ly+4}" fill="#8b949e" font-size="9" text-anchor="middle">${axes[i]}</text>`;
  }
  
  // Data polygons
  works.forEach(w=>{
    const vals=[w.ed/30,w.bd/15,w.dl/40,w.vd/5,w.dAvg/35];
    let path='';
    for(let i=0;i<n;i++){
      const a=-Math.PI/2+2*Math.PI*i/n;
      const v=Math.min(1,vals[i]);
      const x=cx+R*v*Math.cos(a),y=cy+R*v*Math.sin(a);
      path+=(i?'L':'M')+x+','+y;
    }
    html+=`<path d="${path}Z" fill="${w.color}" fill-opacity=".1" stroke="${w.color}" stroke-width="2"/>`;
    // Dots
    for(let i=0;i<n;i++){
      const a=-Math.PI/2+2*Math.PI*i/n;
      const v=Math.min(1,vals[i]);
      html+=`<circle cx="${cx+R*v*Math.cos(a)}" cy="${cy+R*v*Math.sin(a)}" r="3" fill="${w.color}"/>`;
    }
  });
  
  svg.innerHTML=html;
}

// Bars
function drawBars(){
  const svg=document.getElementById('bars');
  const W=svg.clientWidth,H=320;
  const metrics=[
    {key:'vd',label:'語彙密度',max:5,ref:[1.35,1.55]},
    {key:'ed',label:'感情密度',max:30,ref:[15,22]},
    {key:'bd',label:'身体密度',max:15,ref:[6,10]},
    {key:'dl',label:'会話率%',max:40,ref:[15,30]},
    {key:'dAvg',label:'台詞平均長',max:35,ref:null},
  ];
  const mH=50,gap=14,p={l:80,r:20,t:10};
  let html='';
  
  metrics.forEach((m,mi)=>{
    const y=p.t+mi*(mH+gap);
    html+=`<text x="${p.l-6}" y="${y+mH/2+4}" fill="#8b949e" font-size="9" text-anchor="end">${m.label}</text>`;
    
    const bw=W-p.l-p.r;
    // Ref zone
    if(m.ref){
      const x1=p.l+m.ref[0]/m.max*bw, x2=p.l+m.ref[1]/m.max*bw;
      html+=`<rect x="${x1}" y="${y}" width="${x2-x1}" height="${mH}" fill="rgba(86,211,100,.06)" rx="3"/>`;
    }
    
    const bH=(mH-8)/works.length;
    works.forEach((w,wi)=>{
      const by=y+2+wi*bH;
      const val=w[m.key];
      const barW=Math.min(bw,val/m.max*bw);
      html+=`<rect x="${p.l}" y="${by}" width="${barW}" height="${bH-2}" fill="${w.color}" opacity=".7" rx="2"/>`;
      html+=`<text x="${p.l+barW+4}" y="${by+bH/2+1}" fill="${w.color}" font-size="8">${val}</text>`;
    });
  });
  
  svg.innerHTML=html;
}

// Genres
document.getElementById('genres').innerHTML=works.map(w=>`
  <div style="display:flex;align-items:center;gap:10px;padding:8px;margin:4px 0;background:#1c2128;border-radius:6px;border-left:3px solid ${w.color}">
    <div style="font-weight:bold;color:${w.color};min-width:60px">${w.label}</div>
    <div style="font-size:.85em">${w.genre}</div>
    <div style="font-size:.72em;color:#8b949e;margin-left:auto">
      感情${w.ed} / 身体${w.bd} / 会話${w.dl}% / 台詞${w.dAvg}字
    </div>
  </div>
`).join('');

window.addEventListener('load',()=>{drawRadar();drawBars()});
window.addEventListener('resize',()=>{drawRadar();drawBars()});
</script>
</body>
</html>
